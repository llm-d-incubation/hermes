apiVersion: v1
kind: ConfigMap
metadata:
  name: deepgemm-simple-test-script-{{ .Values.testId }}
  namespace: {{ .Values.namespace }}
  labels:
    app: deepgemm-simple-test
    test-id: {{ .Values.testId | quote }}
data:
  entrypoint.sh: |
    #!/bin/bash
    set -e
    echo "Starting DeepGEMM test on node ${NODE_NAME}"

    echo "GPU information:"
    nvidia-smi -L

    echo "PyTorch version: $(python3 -c 'import torch; print(torch.__version__)')"
    echo "CUDA version: $(python3 -c 'import torch; print(torch.version.cuda)')"

    echo "Cloning DeepGEMM repository..."
    cd /tmp
    git clone https://github.com/deepseek-ai/DeepGEMM || echo "Repository already exists"
    cd DeepGEMM
    git checkout {{ .Values.deepgemm.version }}
    echo "Checked out DeepGEMM version: $(git describe --tags --always 2>/dev/null || git rev-parse --short HEAD)"

    # install deep_gemm from source so tests match the checked-out version
    pip install --no-deps --break-system-packages -e . 2>&1 | tail -5
    echo "Installed deep_gemm: $(python3 -c 'import deep_gemm; print(deep_gemm.__path__)' 2>/dev/null || echo 'import check skipped')"

    TEST_FILE="{{ .Values.deepgemm.testFile }}"
    if [ ! -f "$TEST_FILE" ]; then
      echo "ERROR: Test file $TEST_FILE not found at version {{ .Values.deepgemm.version }}"
      echo "Available test files:"
      ls -1 tests/test_*.py 2>/dev/null || echo "  (none)"
      exit 1
    fi

    echo "Running: python3 $TEST_FILE"
    python3 -u "$TEST_FILE" 2>&1 | tee /tmp/test_output.log

    TEST_EXIT_CODE=${PIPESTATUS[0]}
    echo "Test exited with code: $TEST_EXIT_CODE"

    if [ $TEST_EXIT_CODE -eq 0 ]; then
      echo "DeepGEMM test completed successfully"
    else
      echo "DeepGEMM test FAILED with exit code $TEST_EXIT_CODE"
      tail -50 /tmp/test_output.log
      exit $TEST_EXIT_CODE
    fi
