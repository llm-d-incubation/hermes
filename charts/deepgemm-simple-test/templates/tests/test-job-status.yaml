apiVersion: v1
kind: Pod
metadata:
  name: {{ .Release.Name }}-test-job-status
  namespace: {{ .Values.namespace }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": hook-succeeded,hook-failed
spec:
  restartPolicy: Never
  containers:
  - name: test
    image: bitnami/kubectl:latest
    command:
    - /bin/sh
    - -c
    - |
      set -e
      echo "Checking DeepGEMM test job status..."

      kubectl wait --for=condition=complete --timeout=300s \
        -n {{ .Values.namespace }} \
        job/deepgemm-simple-test-{{ .Values.testId }}

      echo "DeepGEMM test completed successfully!"

      echo "Logs:"
      kubectl logs -n {{ .Values.namespace }} -l app=deepgemm-simple-test,test-id={{ .Values.testId }}
