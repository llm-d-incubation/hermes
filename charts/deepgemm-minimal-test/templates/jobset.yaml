apiVersion: batch/v1
kind: Job
metadata:
  name: deepgemm-minimal-test-{{ .Values.testId }}
  namespace: {{ .Values.namespace }}
  labels:
    app: deepgemm-minimal-test
    test-id: {{ .Values.testId | quote }}
spec:
  activeDeadlineSeconds: {{ .Values.activeDeadlineSeconds }}
  ttlSecondsAfterFinished: {{ .Values.ttlSecondsAfterFinished | default 300 }}
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: deepgemm-minimal-test
        test-id: {{ .Values.testId | quote }}
    spec:
      restartPolicy: Never
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
      {{- range .Values.imagePullSecrets }}
      - name: {{ . }}
      {{- end }}
      {{- end }}
      nodeSelector:
        kubernetes.io/hostname: {{ index .Values.topology.nodes 0 "name" | quote }}
      containers:
      - name: deepgemm-test
        image: {{ .Values.image }}
        command: ["/bin/bash", "/opt/deepgemm-test/entrypoint.sh"]
        resources:
          requests:
            {{ .Values.resources.gpu }}: "1"
            memory: {{ .Values.resources.requests.memory }}
            cpu: {{ .Values.resources.requests.cpu | quote }}
          limits:
            {{ .Values.resources.gpu }}: "1"
            memory: {{ .Values.resources.limits.memory }}
            cpu: {{ .Values.resources.limits.cpu | quote }}
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        volumeMounts:
        - name: deepgemm-test-script
          mountPath: /opt/deepgemm-test
          readOnly: true
      volumes:
      - name: deepgemm-test-script
        configMap:
          name: deepgemm-minimal-test-script-{{ .Values.testId }}
          defaultMode: 0755
