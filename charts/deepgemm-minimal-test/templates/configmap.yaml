apiVersion: v1
kind: ConfigMap
metadata:
  name: deepgemm-minimal-test-script-{{ .Values.testId }}
  namespace: {{ .Values.namespace }}
  labels:
    app: deepgemm-minimal-test
    test-id: {{ .Values.testId | quote }}
data:
  entrypoint.sh: |
    #!/bin/bash
    set -e
    echo "Starting DeepGEMM minimal test on node ${NODE_NAME}"

    echo "GPU information:"
    nvidia-smi -L

    echo "PyTorch version: $(python3 -c 'import torch; print(torch.__version__)')"
    echo "CUDA version: $(python3 -c 'import torch; print(torch.version.cuda)')"

    echo "Cloning DeepGEMM repository..."
    cd /tmp
    git clone https://github.com/deepseek-ai/DeepGEMM || echo "Repository already exists"
    cd DeepGEMM
    git checkout {{ .Values.deepgemm.version }}
    echo "Checked out: $(git describe --tags --always 2>/dev/null || git rev-parse --short HEAD)"

    # install from source so the version matches
    pip install --no-deps --break-system-packages -e . 2>&1 | tail -3

    echo ""
    echo "=== DeepGEMM Smoke Test ==="

    python3 -u << 'PYEOF'
    import sys
    import torch

    print(f"Device: {torch.cuda.get_device_name()}")
    print(f"CUDA: {torch.version.cuda}, PyTorch: {torch.__version__}")

    # 1. import check
    import deep_gemm
    print(f"deep_gemm path: {deep_gemm.__path__}")
    gemm_funcs = [f for f in dir(deep_gemm) if 'gemm' in f.lower()]
    print(f"GEMM functions: {gemm_funcs}")

    # 2. FP8 tensor creation
    a = torch.randn(16, 16, device='cuda', dtype=torch.float32)
    a_fp8 = a.to(torch.float8_e4m3fn)
    print(f"FP8 tensor: {a_fp8.shape} {a_fp8.dtype}")

    # 3. basic BF16 GEMM on CUDA
    b = torch.randn(16, 16, device='cuda', dtype=torch.bfloat16)
    c = torch.mm(a.to(torch.bfloat16), b)
    print(f"BF16 GEMM: {c.shape} {c.dtype}")

    print("\nAll smoke tests passed!")
    PYEOF

    echo "DeepGEMM minimal test completed successfully"
