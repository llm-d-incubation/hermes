apiVersion: v1
kind: Pod
metadata:
  name: {{ .Release.Name }}-test-connection
  namespace: {{ .Values.namespace }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
  - name: test
    image: bitnami/kubectl:latest
    command:
    - /bin/sh
    - -c
    - |
      set -e
      echo "Checking DeepGEMM minimal test status..."

      kubectl wait --for=condition=complete --timeout=180s \
        -n {{ .Values.namespace }} \
        job/deepgemm-minimal-test-{{ .Values.testId }}

      echo "DeepGEMM minimal test completed successfully!"

      echo "Logs:"
      kubectl logs -n {{ .Values.namespace }} -l app=deepgemm-minimal-test,test-id={{ .Values.testId }}
