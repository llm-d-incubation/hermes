# Default values for deepgemm-minimal-test

# test configuration
testId: "manual-test"
namespace: default
activeDeadlineSeconds: 180
ttlSecondsAfterFinished: 300

# container image - must have PyTorch with CUDA and FP8 support
image: ghcr.io/llm-d/llm-d-cuda-dev:sha-d58731d@sha256:ba067a81b28546650a5496c3093a21b249c3f0c60d0d305ddcd1907e632e6edd

# optional pull secrets for private registries
imagePullSecrets: []

# DeepGEMM configuration
deepgemm:
  # git version to checkout (tag, branch, or SHA)
  version: "v2.1.1"

# resource requests for GPU compute
resources:
  gpu: nvidia.com/gpu

  requests:
    memory: 4Gi
    cpu: "2"

  limits:
    memory: 8Gi
    cpu: "4"

# topology configuration - automatically injected by hermes
topology:
  nodes:
    - name: node1
      gpus: 8
      rank: 0
      topologyBlock: unknown
  summary:
    totalNodes: 1
    totalGpus: 8
    gpusPerNode: 8
    worldSize: 8
  rdmaType: ""
  platform: Generic
  allSameBlock: true
